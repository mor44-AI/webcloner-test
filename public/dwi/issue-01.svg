<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bg01" cx="70%" cy="15%" r="120%">
      <stop offset="0%" stop-color="#1c3e5b"/>
      <stop offset="55%" stop-color="#0E2536"/>
      <stop offset="100%" stop-color="#0A1A28"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="1600" fill="url(#bg01)"/>
  <!-- Lock-like concentric arc for "Security Premium" -->
  <g stroke="#C8772E" stroke-opacity="0.25" fill="none">
    <circle cx="800" cy="900" r="520" stroke-width="1.2"/>
    <circle cx="800" cy="900" r="420" stroke-width="1.2"/>
    <circle cx="800" cy="900" r="320" stroke-dasharray="3 6" stroke-width="1"/>
  </g>
  <g stroke="#5B93C4" stroke-opacity="0.18" fill="none">
    <line x1="0" y1="400" x2="1200" y2="400" stroke-dasharray="4 8"/>
    <line x1="0" y1="540" x2="1200" y2="540" stroke-dasharray="4 8"/>
    <line x1="0" y1="1100" x2="1200" y2="1100" stroke-dasharray="4 8"/>
  </g>
  <text x="90" y="280" fill="#F5F2E9" fill-opacity="0.18" font-family="Georgia, serif" font-style="italic" font-size="160">The Security</text>
  <text x="90" y="460" fill="#F5F2E9" fill-opacity="0.12" font-family="Georgia, serif" font-style="italic" font-size="160">Premium.</text>
</svg>
